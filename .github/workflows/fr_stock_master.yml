name: FR Stock Master (daily to Drive)

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 01:10 Asia/Taipei (UTC+8) => 17:10 UTC (previous day)
    - cron: "10 17 * * *"

  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to scrape (default 11)"
        required: false
        default: "11"
        type: string
      output_name:
        description: "Output CSV name on Drive"
        required: false
        default: "FR_Stock_Master_Data.csv"
        type: string
      resolve_max:
        description: "How many quote pages to resolve tickers this run (default 120)"
        required: false
        default: "120"
        type: string

permissions:
  contents: write

concurrency:
  group: fr_stock_master_${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2

      - name: Run FR stock master -> Google Drive
        env:
          GDRIVE_TOKEN_B64: ${{ secrets.GDRIVE_TOKEN_B64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.fr_stocklist }}

          FR_MAX_PAGES: ${{ inputs.max_pages }}
          FR_OUTPUT_NAME: ${{ inputs.output_name }}

          FR_SLEEP_SEC: "3"
          FR_HTTP_TIMEOUT_SEC: "20"

          FR_TICKER_CACHE_PATH: "data/cache/fr_ticker_cache.csv"
          FR_RESOLVE_MAX: ${{ inputs.resolve_max }}
          FR_RESOLVE_SLEEP_SEC: "0.25"
          FR_MAX_RETRY: "3"

          FR_OVERRIDE_PATH: "data/overrides/fr_yf_override.csv"
        run: |
          python stocksymboldownload/fr_stock_master_drive.py

      # ✅ Persist cache by committing it back to repo (only if changed)
      - name: Commit ticker cache (if changed)
        run: |
          set -e
          if [ -f data/cache/fr_ticker_cache.csv ]; then
            git status --porcelain
            if [ -n "$(git status --porcelain data/cache/fr_ticker_cache.csv)" ]; then
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add data/cache/fr_ticker_cache.csv
              git commit -m "Update FR ticker cache"
              git push
              echo "✅ cache committed"
            else
              echo "ℹ️ cache unchanged"
            fi
          else
            echo "ℹ️ cache file not found, skip"
          fi
