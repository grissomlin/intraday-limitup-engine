name: Run Shorts (UK+FR @ 19:10 TW, schedule=public, manual=private)

on:
  schedule:
    # 19:10 Asia/Taipei (UTC+8) => 11:10 UTC
    - cron: "10 11 * * 1-5"

  workflow_dispatch:
    inputs:
      markets:
        description: "markets to run (manual)"
        required: true
        default: "uk,fr"
        type: choice
        options:
          - uk
          - fr
          - uk,fr

      slot:
        description: "slot (open/midday/close)"
        required: true
        default: "midday"
        type: choice
        options: [open, midday, close]

      images_ymd:
        description: "images ymd (latest | YYYY-MM-DD)"
        required: true
        default: "latest"
        type: string

      privacy:
        description: "YouTube privacy (manual only)"
        required: true
        default: "private"
        type: choice
        options: [private, public, unlisted]

concurrency:
  group: run_shorts_ukfr_1910tw_${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest

    env:
      SCHEDULE_CRON: ${{ github.event.schedule }}

    outputs:
      should_run: ${{ steps.plan.outputs.should_run }}
      slot: ${{ steps.plan.outputs.slot }}
      images_ymd: ${{ steps.plan.outputs.images_ymd }}
      privacy: ${{ steps.plan.outputs.privacy }}
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Setup Python (for plan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: plan
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, json
          from datetime import datetime, timezone

          event = os.getenv("GITHUB_EVENT_NAME","")
          cron = (os.getenv("SCHEDULE_CRON","") or "").strip()

          in_markets = (os.getenv("INPUT_MARKETS","") or "").strip().lower()
          in_slot = (os.getenv("INPUT_SLOT","") or "").strip().lower()
          in_images_ymd = (os.getenv("INPUT_IMAGES_YMD","") or "").strip()
          in_privacy = (os.getenv("INPUT_PRIVACY","") or "").strip().lower()

          # defaults
          slot = in_slot if (event=="workflow_dispatch" and in_slot) else "midday"
          images_ymd = in_images_ymd if (event=="workflow_dispatch" and in_images_ymd) else "latest"

          # schedule behavior: always run BOTH markets, privacy PUBLIC
          if event != "workflow_dispatch":
              markets = ["uk","fr"]
              privacy = "public"
          else:
              # manual: allow choose markets + default privacy private
              privacy = in_privacy if in_privacy else "private"
              if in_markets in ("uk","fr"):
                  markets = [in_markets]
              else:
                  markets = ["uk","fr"]

          now_utc = datetime.now(timezone.utc)

          # anti-lag gating
          should_run = False
          if event == "workflow_dispatch":
              should_run = True
          else:
              if cron == "10 11 * * 1-5":
                  should_run = True
              else:
                  # fallback window: 11:00~12:59 UTC
                  if 11 <= now_utc.hour <= 12:
                      should_run = True

          matrix = {"include": [{"market": m} for m in markets]}

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
              f.write(f"slot={slot}\n")
              f.write(f"images_ymd={images_ymd}\n")
              f.write(f"privacy={privacy}\n")
              f.write(f"matrix={json.dumps(matrix)}\n")

          print("[PLAN]")
          print("  event      =", event)
          print("  schedule   =", cron)
          print("  now_utc    =", now_utc.isoformat(timespec="seconds"))
          print("  should_run =", should_run)
          print("  markets    =", markets)
          print("  privacy    =", privacy)
          print("  slot       =", slot)
          print("  images_ymd =", images_ymd)
          print("  matrix     =", matrix)
          PY

  run:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    name: run_shorts ${{ matrix.market }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: $RUNNER_TEMP/mpl-ukfr

      RUN_SHORTS_DEBUG_TREE: "1"
      OVERVIEW_DEBUG_FONTS: "1"
      OVERVIEW_DEBUG_FOOTER: "1"

      # Google Drive
      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_TOKEN_B64: ${{ secrets.GDRIVE_TOKEN_B64 }}
      GDRIVE_CLIENT_SECRET_B64: ${{ secrets.GDRIVE_CLIENT_SECRET_B64 }}
      GDRIVE_ALLOW_INTERACTIVE: "0"

      # YouTube
      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      YOUTUBE_PLAYLIST_MAP_JSON: ${{ secrets.YOUTUBE_PLAYLIST_MAP_JSON }}

      # -------------------------
      # FR filters (your request)
      # -------------------------
      FR_MIN_PRICE: "0.10"
      FR_MIN_VOLUME: "50000"
      FR_TICK_EUR: "0.01"
      FR_EXCLUDE_ONE_TICK_10PCT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo schedule info
        shell: bash
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "TW target=19:10 (UTC=11:10)"
          echo "market=${{ matrix.market }}"
          echo "slot=${{ needs.plan.outputs.slot }}"
          echo "images_ymd=${{ needs.plan.outputs.images_ymd }}"
          echo "privacy=${{ needs.plan.outputs.privacy }}"
          echo "now_utc=$(date -u '+%F %T %Z')"
          TZ=Asia/Taipei date '+now_tw=%F %T %Z' || true
          echo "MPLCONFIGDIR=${MPLCONFIGDIR}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ============================================================
      # SYSTEM DEPENDENCIES + FULL FONT STACK (CJK/TH/Emoji)
      # ============================================================
      - name: Install system deps (FULL FONT STACK)
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update

          sudo apt-get install -y \
            ffmpeg \
            fontconfig

          sudo apt-get install -y \
            fonts-dejavu-core \
            fonts-dejavu-extra

          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-noto-core || true

          sudo apt-get install -y fonts-noto-color-emoji || true

          sudo apt-get install -y \
            fonts-noto-extra \
            fonts-noto-ui-core \
            fonts-noto-unhinted || true

          sudo apt-get install -y fonts-noto-cjk-extra || true

          sudo fc-cache -f -v

          echo "---- fc-list (CJK candidates) ----"
          fc-list | grep -iE "noto sans (cjk|tc|sc|kr)|noto serif (cjk|tc|sc|kr)|noto sans (tc|sc|kr)" || true
          echo "----------------------------------"

          rm -rf ~/.cache/matplotlib ~/.config/matplotlib || true
          rm -rf "${MPLCONFIGDIR}" || true
          mkdir -p "${MPLCONFIGDIR}"

      - name: Install python deps
        shell: bash
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-ci.txt ]; then
            pip install -r requirements-ci.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "::error::No requirements file found!"
            exit 1
          fi

      - name: Rebuild matplotlib font manager (verify)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import os
          import matplotlib
          matplotlib.use("Agg")
          from matplotlib import font_manager as fm
          import matplotlib.pyplot as plt

          print("MPLCONFIGDIR:", os.environ.get("MPLCONFIGDIR"))
          fm._load_fontmanager(try_read_cache=False)

          names = sorted({f.name for f in fm.fontManager.ttflist})
          print("Fonts count:", len(names))

          want = [
              "Noto Sans",
              "DejaVu Sans",
              "Noto Sans CJK JP",
              "Noto Sans CJK KR",
              "Noto Sans CJK SC",
              "Noto Sans CJK TC",
              "Noto Color Emoji",
          ]

          print("\n[FONT CHECK]")
          for n in want:
              print(f"{n:22} : {'OK' if n in names else 'MISSING'}")

          print("\n[rcParams preview]")
          print("  font.family     =", plt.rcParams.get("font.family"))
          print("  font.sans-serif =", (plt.rcParams.get("font.sans-serif") or [])[:30])
          PY

      - name: Ensure output directories
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p media/images media/videos outputs

      - name: Run shorts (UK/FR)
        shell: bash
        run: |
          set -euxo pipefail
          python scripts/run_shorts.py \
            --market "${{ matrix.market }}" \
            --slot "${{ needs.plan.outputs.slot }}" \
            --full \
            --privacy "${{ needs.plan.outputs.privacy }}" \
            --drive \
            --drive-parent-id "${GDRIVE_ROOT_FOLDER_ID}" \
            --drive-order after_youtube \
            --drive-upload both \
            --drive-images-mode zip \
            --images-ymd "${{ needs.plan.outputs.images_ymd }}"

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts_${{ matrix.market }}_${{ github.run_id }}
          path: |
            outputs/**
            media/videos/**
            media/images/**/list_video.txt
          if-no-files-found: ignore
