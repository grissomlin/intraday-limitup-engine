name: Run Shorts (Asia fixed TW time, schedule=public + manual)

on:
  schedule:
    # JP/KR @ 10:00 TW => 02:00 UTC
    - cron: "0 2 * * 1-5"

    # CN @ 10:30 TW => 02:30 UTC
    - cron: "30 2 * * 1-5"

    # TH + IN @ 13:00 TW => 05:00 UTC
    - cron: "0 5 * * 1-5"

  workflow_dispatch:
    inputs:
      slot:
        description: "slot (open/midday/close)"
        required: true
        default: "midday"
        type: choice
        options: [open, midday, close]

      images_ymd:
        description: "images ymd (latest | YYYY-MM-DD)"
        required: true
        default: "latest"
        type: string

      privacy:
        description: "YouTube privacy (manual only)"
        required: true
        default: "private"
        type: choice
        options: [private, public, unlisted]

      markets:
        description: "Manual markets: all | jp,kr,cn,th,in (comma-separated)"
        required: true
        default: "in"
        type: string

concurrency:
  group: run_shorts_asia_fixed_${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      SCHEDULE_CRON: ${{ github.event.schedule }}

    outputs:
      should_run: ${{ steps.plan.outputs.should_run }}
      matrix_json: ${{ steps.plan.outputs.matrix_json }}
      slot: ${{ steps.plan.outputs.slot }}
      images_ymd: ${{ steps.plan.outputs.images_ymd }}
      privacy: ${{ steps.plan.outputs.privacy }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: plan
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone

          event = (os.getenv("GITHUB_EVENT_NAME","") or "").strip()
          cron  = (os.getenv("SCHEDULE_CRON","") or "").strip()

          in_slot        = (os.getenv("INPUT_SLOT","") or "").strip().lower()
          in_images_ymd  = (os.getenv("INPUT_IMAGES_YMD","") or "").strip()
          in_privacy     = (os.getenv("INPUT_PRIVACY","") or "").strip().lower()
          in_markets     = (os.getenv("INPUT_MARKETS","") or "").strip().lower()

          slot       = in_slot if (event=="workflow_dispatch" and in_slot) else "midday"
          images_ymd = in_images_ymd if (event=="workflow_dispatch" and in_images_ymd) else "latest"

          privacy_allowed = {"private","public","unlisted"}
          privacy = in_privacy if (event=="workflow_dispatch" and in_privacy) else "private"
          if privacy not in privacy_allowed:
              privacy = "private"

          ALL = ["jp","kr","cn","th","in"]
          now_utc = datetime.now(timezone.utc)

          chosen = []

          if event == "workflow_dispatch":
              # manual mode
              if in_markets in ("all", "*"):
                  chosen = ALL[:]
              else:
                  parts = [p.strip() for p in in_markets.split(",") if p.strip()]
                  chosen = [p for p in parts if p in ALL]

          else:
              # schedule mode
              mapping = {
                  "0 2 * * 1-5":  ["jp","kr"],
                  "30 2 * * 1-5": ["cn"],
                  "0 5 * * 1-5":  ["th","in"],
              }
              chosen = mapping.get(cron, [])

              if not chosen:
                  h = now_utc.hour
                  m = now_utc.minute

                  if h == 2 and m < 20:
                      chosen = ["jp","kr"]
                  elif h == 2 and 20 <= m <= 55:
                      chosen = ["cn"]
                  elif h == 5:
                      chosen = ["th","in"]
                  else:
                      chosen = []

              privacy = "public"

          seen=set()
          chosen=[x for x in chosen if (x not in seen and not seen.add(x))]

          matrix = {"include": [{"market": x} for x in chosen]}
          should_run = "true" if chosen else "false"

          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a", encoding="utf-8") as f:
              f.write(f"should_run={should_run}\n")
              f.write("matrix_json=" + json.dumps(matrix) + "\n")
              f.write(f"slot={slot}\n")
              f.write(f"images_ymd={images_ymd}\n")
              f.write(f"privacy={privacy}\n")

          print("[PLAN]")
          print("  event      =", event)
          print("  schedule   =", cron)
          print("  chosen     =", chosen)
          print("  privacy    =", privacy)
          print("  matrix     =", json.dumps(matrix))
          PY

  run:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix_json).include }}

    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: $RUNNER_TEMP/mpl-${{ matrix.market }}

      GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
      GDRIVE_TOKEN_B64: ${{ secrets.GDRIVE_TOKEN_B64 }}
      GDRIVE_CLIENT_SECRET_B64: ${{ secrets.GDRIVE_CLIENT_SECRET_B64 }}
      GDRIVE_TOKEN_JSON_B64: ${{ secrets.GDRIVE_TOKEN_B64 }}
      GDRIVE_CLIENT_SECRET_JSON_B64: ${{ secrets.GDRIVE_CLIENT_SECRET_B64 }}

      YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
      YOUTUBE_PLAYLIST_MAP_JSON: ${{ secrets.YOUTUBE_PLAYLIST_MAP_JSON }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fontconfig fonts-dejavu-core fonts-noto-cjk || true
          python -m pip install --upgrade pip
          if [ -f requirements-ci.txt ]; then
            pip install -r requirements-ci.txt
          else
            pip install -r requirements.txt
          fi

      - name: Run shorts
        run: |
          python scripts/run_shorts.py \
            --market ${{ matrix.market }} \
            --slot "${{ needs.plan.outputs.slot }}" \
            --full \
            --privacy "${{ needs.plan.outputs.privacy }}" \
            --drive \
            --drive-parent-id "${GDRIVE_ROOT_FOLDER_ID}" \
            --drive-order after_youtube \
            --drive-upload both \
            --drive-images-mode zip \
            --images-ymd "${{ needs.plan.outputs.images_ymd }}"
