name: tw_stock_metadata_mapping

on:
  schedule:
    # 台灣時間 09:30
    - cron: "30 1 * * *"
    # 台灣時間 18:00
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  tw_stock_metadata_mapping:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml html5lib

      - name: Run tw stock metadata builder
        run: |
          python stocksymboldownload/build_stock_metadata.py

      - name: Run tw industry mapping builder
        run: |
          python stocksymboldownload/build_tw_industry_mapping.py

      - name: Upload generated csv artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tw_stock_metadata_outputs
          path: |
            stocksymboldownload/stock_metadata.csv
            stocksymboldownload/industry_mapping_final.csv
          if-no-files-found: warn
