name: Run Shorts (TW @ 10:00 TW, public)

on:
  schedule:
    # 10:00 Asia/Taipei (UTC+8) => 02:00 UTC
    - cron: "0 2 * * 1-5"

  workflow_dispatch:
    inputs:
      slot:
        description: "slot (open/midday/close)"
        required: true
        default: "midday"
        type: choice
        options: [open, midday, close]

      images_ymd:
        description: "images ymd (latest | YYYY-MM-DD)"
        required: true
        default: "latest"
        type: string

      privacy:
        description: "video privacy (manual run only)"
        required: true
        default: "private"
        type: choice
        options: [private, public]
